<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="60%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Diagonal cloud accents -->
  <g opacity="0.16" fill="#ffffff">
    <ellipse cx="180" cy="220" rx="180" ry="50"/>
    <ellipse cx="900" cy="380" rx="160" ry="44"/>
    <ellipse cx="240" cy="780" rx="200" ry="55"/>
  </g>

  <!-- Top label -->
  <g transform="translate(540, 130)">
    <rect x="-180" y="-32" width="360" height="64" rx="32" fill="#1e293b"/>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="26" fill="#fbbf24" letter-spacing="2">✈️ TIKET PESAWAT</text>
  </g>

  <!-- Headline -->
  <text x="540" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="900" font-size="100" fill="#ffffff" letter-spacing="-3">HARGA</text>
  <text x="540" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="900" font-size="120" fill="#1e293b" letter-spacing="-3">TERMURAH!</text>

  <!-- Plane silhouette giant emoji -->
  <text x="540" y="600" text-anchor="middle" font-size="220">✈️</text>

  <!-- Card with bullet points -->
  <g transform="translate(540, 760)">
    <rect x="-340" y="-70" width="680" height="140" rx="20" fill="url(#card)"/>
    <g font-family="system-ui, sans-serif" font-weight="700" font-size="26" fill="#1e293b">
      <text x="-300" y="-22">✓ Domestik &amp; Internasional</text>
      <text x="-300" y="22">✓ Issued cepat, harga real-time</text>
      <text x="-300" y="66">✓ Pesan via mitra resmi, garansi</text>
    </g>
  </g>

  <!-- Footer agent contact band -->
  <g transform="translate(0, 920)">
    <rect width="1080" height="160" fill="#1e293b"/>
    <rect width="1080" height="6" fill="#fbbf24"/>
    <text x="60" y="58" font-family="system-ui, sans-serif" font-weight="600" font-size="22" fill="#fbbf24" letter-spacing="2">PESAN SEKARANG VIA MITRA</text>
    <text x="60" y="105" font-family="system-ui, sans-serif" font-weight="900" font-size="42" fill="#ffffff">{{AGENT_NAME}}</text>
    <text x="60" y="142" font-family="system-ui, sans-serif" font-weight="600" font-size="26" fill="#fed7aa">📱 {{AGENT_WA}}</text>
  </g>
</svg>

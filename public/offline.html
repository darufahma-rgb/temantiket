<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>IGH Tour — Offline</title>
  <meta name="theme-color" content="#f97316" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      background: #fff7ed;
      color: #3b1f0d;
      padding: 2rem;
      padding-top: calc(2rem + env(safe-area-inset-top));
      padding-bottom: calc(2rem + env(safe-area-inset-bottom));
      text-align: center;
    }
    img { width: 72px; height: 72px; object-fit: contain; border-radius: 20px; margin-bottom: 0.5rem; }
    h1 { font-size: 1.25rem; font-weight: 700; }
    p { font-size: 0.875rem; color: #7c4a1f; line-height: 1.5; max-width: 280px; }
    button {
      margin-top: 1rem;
      padding: 0.75rem 2rem;
      border-radius: 1rem;
      background: linear-gradient(135deg, #f97316, #fb923c);
      color: white;
      font-weight: 600;
      font-size: 0.9375rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(249,115,22,0.35);
    }
    button:active { opacity: 0.85; transform: scale(0.97); }
    .icon {
      width: 56px;
      height: 56px;
      background: #ffedd5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      margin-bottom: 0.25rem;
    }
  </style>
</head>
<body>
  <img src="/logo-igh-tour.png" alt="IGH Tour" />
  <div class="icon">📡</div>
  <h1>Tidak Ada Koneksi</h1>
  <p>Periksa koneksi internet Anda, lalu coba lagi. Data yang sudah dimuat sebelumnya masih tersedia.</p>
  <button onclick="window.location.reload()">Coba Lagi</button>
</body>
</html>
